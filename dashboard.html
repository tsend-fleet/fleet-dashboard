<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <nav class="p-6 border-b border-slate-900 flex justify-between items-center bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <h2 id="mc-head" class="font-black text-blue-500 tracking-tighter italic text-xl">MC: --</h2>
        <button onclick="location.href='index.html'" class="text-[10px] font-bold uppercase text-slate-500 border border-slate-800 px-4 py-2 rounded-full hover:bg-slate-900 transition-all">Logout</button>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Gross Revenue</p>
                <h3 id="g-rev" class="text-2xl font-black text-blue-400">$0.00</h3>
            </div>
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total Expenses</p>
                <h3 id="g-exp" class="text-2xl font-black text-red-500">$0.00</h3>
            </div>
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Net Profit</p>
                <h3 id="g-prof" class="text-2xl font-black text-green-500">$0.00</h3>
            </div>
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">System CPM</p>
                <h3 id="g-cpm" class="text-2xl font-black text-white">$0.00</h3>
            </div>
        </div>

        <div id="truck-list" class="flex gap-4 overflow-x-auto pb-6 scrollbar-hide"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
            <div class="lg:col-span-2 bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="text-xs font-black uppercase tracking-widest text-slate-400">Revenue Performance</h4>
                    <span id="active-unit" class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-bold">ALL UNITS</span>
                </div>
                <canvas id="mainChart"></canvas>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800">
                <h4 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Expense Distribution</h4>
                <div id="breakdown" class="space-y-4">
                    <p class="text-slate-600 text-sm italic">Select a truck to see details...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const URL = sessionStorage.getItem('clientDataUrl');
        document.getElementById('mc-head').innerText = "MC: " + sessionStorage.getItem('mcDisplay');
        let chartObj = null;

        async function load() {
            try {
                const res = await fetch(URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g, '')));
                let trucks = {}, cur = null;

                rows.forEach(r => {
                    if (r[0].includes("TRUCK #:")) {
                        cur = r[0].replace("TRUCK #: ", "");
                        trucks[cur] = { id: cur, rev: 0, exp: 0, miles: 0, w: [0, 0, 0, 0], details: [] };
                    }
                    if (cur) {
                        if (r[0] === "Revenue") { 
                            trucks[cur].rev = parseFloat(r[5]); 
                            trucks[cur].w = [parseFloat(r[1]), parseFloat(r[2]), parseFloat(r[3]), parseFloat(r[4])]; 
                        }
                        if (r[0] === "OVERALL EXPENSE") trucks[cur].exp = parseFloat(r[5]);
                        if (r[0] === "TOTAL MILES") trucks[cur].miles = parseFloat(r[5]);
                        if (!r[0].includes("TRUCK") && r[0] !== "" && !r[0].includes("NET") && !r[0].includes("CPM") && !r[0].includes("EXPENSE") && !r[0].includes("MILES")) {
                            trucks[cur].details.push(r);
                        }
                    }
                });
                render(trucks);
            } catch(e) { console.error("Load Error", e); }
        }

        function render(trucks) {
            const list = document.getElementById('truck-list');
            let gr = 0, ge = 0, gm = 0;
            Object.values(trucks).forEach(t => {
                gr += t.rev; ge += t.exp; gm += t.miles;
                const card = document.createElement('div');
                card.className = "min-w-[140px] p-6 bg-slate-900 rounded-3xl border border-slate-800 cursor-pointer hover:border-blue-500 hover:bg-slate-800 transition-all text-center";
                card.innerHTML = `<p class="text-[9px] text-slate-500 font-black uppercase mb-1">UNIT</p><h4 class="text-xl font-black text-white">#${t.id}</h4>`;
                card.onclick = () => select(t);
                list.appendChild(card);
            });

            document.getElementById('g-rev').innerText = `$${gr.toLocaleString()}`;
            document.getElementById('g-exp').innerText = `$${ge.toLocaleString()}`;
            document.getElementById('g-prof').innerText = `$${(gr - ge).toLocaleString()}`;
            document.getElementById('g-cpm').innerText = gm > 0 ? `$${(ge / gm).toFixed(2)}` : "$0.00";
        }

        function select(t) {
            document.getElementById('active-unit').innerText = "UNIT #" + t.id;
            const bd = document.getElementById('breakdown');
            bd.innerHTML = t.details.map(d => `
                <div class="flex justify-between items-center border-b border-slate-800/50 pb-2">
                    <span class="text-slate-400 text-xs font-bold uppercase">${d[0]}</span>
                    <span class="font-black text-white text-sm">$${d[5]}</span>
                </div>
            `).join('');

            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], 
                    datasets: [{ 
                        label: 'Revenue', 
                        data: t.w, 
                        borderColor: '#3b82f6', 
                        borderWidth: 4,
                        pointBackgroundColor: '#3b82f6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }] 
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }
        load();
    </script>
</body>
</html>
