<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Service Portal | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter">FLEET SERVICE</h1>
            <p class="text-slate-400 text-sm mt-2">Enter credentials to access fleet intelligence</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">MC Number</label>
                <input type="text" id="mc-input" placeholder="e.g. 123456" 
                    class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Access Code</label>
                <input type="password" id="code-input" placeholder="••••" 
                    class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button onclick="handleLogin()" id="login-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                ACCESS DASHBOARD
            </button>
            
            <p id="error-msg" class="text-red-400 text-center text-sm hidden">Invalid MC or Access Code. Please try again.</p>
        </div>
    </div>

    <script>
        // PASTE YOUR AUTH CSV URL BELOW
        const AUTH_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnl61PSkJxzyj_K3WkeFVFzvuzAzRCf3yoEG7FVt2rCyx8OJQrya-tbVfOi5hiOHmE0suQXvxz_MOD/pub?gid=960355181&single=true&output=csv";

        async function handleLogin() {
            const mcInput = document.getElementById('mc-input').value.trim();
            const codeInput = document.getElementById('code-input').value.trim();
            const error = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!mcInput || !codeInput) {
                error.textContent = "Please fill in both fields.";
                error.classList.remove('hidden');
                return;
            }

            btn.textContent = "Verifying...";
            btn.disabled = true;

            try {
                const response = await fetch(AUTH_SHEET_URL);
                const csvData = await response.text();
                
                // Parse CSV rows
                const rows = csvData.split('\n').map(row => row.split(',').map(cell => cell.trim().replace(/"/g, '')));

                // Check if MC (Column 0) and Code (Column 1) match
                const user = rows.find(r => r[0] === mcInput && r[1] === codeInput);

                if (user) {
                    sessionStorage.setItem('currentMC', mcInput);
                    window.location.href = 'dashboard.html';
                } else {
                    error.textContent = "Invalid MC or Access Code.";
                    error.classList.remove('hidden');
                    btn.textContent = "ACCESS DASHBOARD";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("Connection Error. Make sure your Sheet is 'Published to Web' as CSV.");
                btn.textContent = "ACCESS DASHBOARD";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
