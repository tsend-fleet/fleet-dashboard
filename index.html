<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Fleet Portal | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-blue-500 font-black text-3xl tracking-tighter italic">SHIELD FLEET</h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-1">Intelligence Portal</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="mcNumber" class="w-full bg-slate-800 border-2 border-transparent focus:border-blue-600 p-5 rounded-2xl text-white font-bold outline-none transition-all" placeholder="MC Number">
            <input type="password" id="accessCode" class="w-full bg-slate-800 border-2 border-transparent focus:border-blue-600 p-5 rounded-2xl text-white font-bold outline-none transition-all" placeholder="Access Code">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs transition-all active:scale-95 shadow-lg shadow-blue-900/20">Verify Access</button>
            <p id="errorMessage" class="text-red-500 text-center text-[10px] font-bold uppercase hidden">Invalid MC or Access Code</p>
        </div>
    </div>
    <script>
        const MASTER_AUTH_CSV_URL = "YOUR_MASTER_AUTH_SHEET_CSV_LINK_HERE";
        async function handleLogin() {
            const mc = document.getElementById('mcNumber').value.trim();
            const code = document.getElementById('accessCode').value.trim();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "VERIFYING...";
            try {
                const res = await fetch(MASTER_AUTH_CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g, '')));
                const user = rows.find(r => r[0] === mc && r[1] === code);
                if (user) {
                    sessionStorage.setItem('clientDataUrl', user[2]);
                    sessionStorage.setItem('mcDisplay', mc);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMessage').classList.remove('hidden');
                    btn.innerText = "VERIFY ACCESS";
                }
            } catch (e) { alert("Server Connection Error"); btn.innerText = "VERIFY ACCESS"; }
        }
    </script>
</body>
</html>
